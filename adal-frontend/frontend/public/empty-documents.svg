      <stop offset="0%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>
  <!-- Stack of documents -->
  <rect x="60" y="50" width="80" height="100" rx="4" fill="url(#emptyDocGrad)" opacity="0.15"/>
