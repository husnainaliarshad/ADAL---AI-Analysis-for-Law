<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="none">
  <defs>
    <linearGradient id="searchGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>
  <!-- Magnifying glass -->
  <circle cx="85" cy="75" r="45" stroke="url(#searchGrad)" stroke-width="3" fill="none" opacity="0.6"/>
  <line x1="115" y1="105" x2="155" y2="145" stroke="url(#searchGrad)" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <!-- Slash / no results indicator -->
  <line x1="40" y1="130" x2="160" y2="30" stroke="url(#searchGrad)" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
</svg>
