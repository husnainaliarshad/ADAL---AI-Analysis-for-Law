name: Deploy FastAPI to EC2

on:
  push:
    branches:
      - main  # Triggers the pipeline whenever you push to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }} # This will be ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # 1. Force move to the absolute correct repository root path
            cd /home/ec2-user/ADAL---AI-Analysis-for-Law
            
            # 2. Fetch everything and force reset the local branch to mirror GitHub exactly
            git fetch --all
            git reset --hard origin/main
            
            # 3. Move into the specific backend folder for python environment tasks
            cd adal-backend
            
            # 4. Install dependencies from both files into your venv cleanly
            ./venv/bin/pip install -r old-requirements.txt
            ./venv/bin/pip install -r requirements.txt
            
            # 5. Restart your background FastAPI service
            sudo systemctl restart fastapi